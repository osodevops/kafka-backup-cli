# Kitty profile for kafka-backup-monitor screen recording
# Usage: kitty --config assets/terminal-profiles/kitty.conf

font_family      JetBrains Mono
font_size        16.0
adjust_line_height 110%

initial_window_width  120c
initial_window_height 40c

window_padding_width 20
background_opacity   1.0
hide_window_decorations yes

background #0F172A
foreground #F8FAFC

cursor          #F8FAFC
cursor_text_color #0F172A

selection_background #334155
selection_foreground #F8FAFC

# Normal colors
color0  #0F172A
color1  #EF4444
color2  #10B981
color3  #F59E0B
color4  #2563EB
color5  #8B5CF6
color6  #06B6D4
color7  #F8FAFC

# Bright colors
color8  #64748B
color9  #EF4444
color10 #10B981
color11 #F59E0B
color12 #38BDF8
color13 #8B5CF6
color14 #06B6D4
color15 #F8FAFC
