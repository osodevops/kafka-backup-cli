name: "Speed Backup Demo"
description: "20-second backup-only demo showing throughput and sparklines"

cluster:
  name: "prod-kafka"
  brokers: 3

backup:
  id: "speed-backup-001"
  storage: "s3://oso-kafka-backups/prod/"
  compression: "zstd"

topics:
  - name: "orders"
    partitions: 3
    total_records: [150234, 148891, 152456]
  - name: "payments"
    partitions: 2
    total_records: [78234, 81023]
  - name: "events"
    partitions: 3
    total_records: [234567, 228901, 241234]

scenes:
  - name: "intro"
    duration_ms: 1500
    effect: "fade_from_black"
    actions:
      - type: set_phase
        phase: "BACKUP"
      - type: pipeline_stage
        active: "kafka"
      - type: log
        message: "Starting high-speed backup: speed-backup-001"
        level: "INFO"

  - name: "consume"
    duration_ms: 5000
    actions:
      - type: animate_partitions
        target_progress: 0.4
        throughput_range: [110, 165]
        throughput_variance: 0.12
      - type: pipeline_stage
        active: "consume"
      - type: log_stream
        messages:
          - { delay: 300, message: "Connected to Kafka cluster (3 brokers)", level: "INFO" }
          - { delay: 1000, message: "Consuming 8 partitions across 3 topics", level: "INFO" }
          - { delay: 2500, message: "Throughput: 145 MB/s average", level: "INFO" }
          - { delay: 4000, message: "Segment 32/156 written", level: "INFO" }

  - name: "compress_store"
    duration_ms: 10000
    actions:
      - type: animate_partitions
        target_progress: 1.0
        throughput_range: [120, 170]
        stagger_completion: true
        throughput_variance: 0.1
      - type: pipeline_stage_sequence
        stages: ["compress", "store"]
        transition_at: 0.4
      - type: update_summary
        compression_ratio: 3.8
      - type: log_stream
        messages:
          - { delay: 1000, message: "Compressing with zstd (level 3)", level: "INFO" }
          - { delay: 3000, message: "events:0 complete — 234,567 records", level: "INFO" }
          - { delay: 5000, message: "orders:1 complete — 148,891 records", level: "INFO" }
          - { delay: 7000, message: "Segment 128/156 written", level: "INFO" }
          - { delay: 9000, message: "Finalising remaining segments", level: "INFO" }

  - name: "complete"
    duration_ms: 3500
    effect: "celebration"
    actions:
      - type: set_phase
        phase: "COMPLETE"
      - type: pipeline_stage
        active: "done"
      - type: log
        message: "Backup complete: 1,315,540 records in 18.2s"
        level: "INFO"
      - type: log
        message: "Compressed: 1.3 GB → 341 MB (3.8:1) | 152 MB/s avg"
        level: "INFO"
      - type: show_cta
        text: "github.com/osodevops/kafka-backup"
        effect: "coalesce"
