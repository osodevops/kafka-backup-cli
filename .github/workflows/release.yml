name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../kafka-backup-monitor-${{ matrix.target }}.tar.gz kafka-backup-monitor

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../kafka-backup-monitor-${{ matrix.target }}.zip kafka-backup-monitor.exe

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" kafka-backup-monitor-${{ matrix.target }}.* --clobber

  homebrew:
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/osodevops/kafka-backup-cli/releases/download/${GITHUB_REF_NAME}"

          curl -fsSL "${BASE_URL}/kafka-backup-monitor-aarch64-apple-darwin.tar.gz" -o arm64.tar.gz
          curl -fsSL "${BASE_URL}/kafka-backup-monitor-x86_64-apple-darwin.tar.gz" -o x86_64_mac.tar.gz
          curl -fsSL "${BASE_URL}/kafka-backup-monitor-x86_64-unknown-linux-gnu.tar.gz" -o x86_64_linux.tar.gz

          SHA_ARM64=$(sha256sum arm64.tar.gz | awk '{print $1}')
          SHA_X86_64_MAC=$(sha256sum x86_64_mac.tar.gz | awk '{print $1}')
          SHA_X86_64_LINUX=$(sha256sum x86_64_linux.tar.gz | awk '{print $1}')

          cat > kafka-backup-monitor.rb <<FORMULA
          class KafkaBackupMonitor < Formula
            desc "Real-time TUI dashboard for kafka-backup monitoring"
            homepage "https://github.com/osodevops/kafka-backup-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/kafka-backup-monitor-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "${BASE_URL}/kafka-backup-monitor-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_MAC}"
              end
            end

            on_linux do
              url "${BASE_URL}/kafka-backup-monitor-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_X86_64_LINUX}"
            end

            def install
              bin.install "kafka-backup-monitor"
            end

            test do
              assert_match "kafka-backup-monitor", shell_output("#{bin}/kafka-backup-monitor --version")
            end
          end
          FORMULA

          sed -i 's/^          //' kafka-backup-monitor.rb

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/osodevops/homebrew-tap.git" tap
          cp kafka-backup-monitor.rb tap/Formula/kafka-backup-monitor.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kafka-backup-monitor.rb
          git commit -m "kafka-backup-monitor ${VERSION}"
          git push

  scoop:
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scoop bucket update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          repository: osodevops/scoop-bucket
          event-type: update-kafka-backup-monitor-manifest
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "tag": "${{ github.ref_name }}"}'
